name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage public site (exclude internal dirs)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='_site' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.vscode' \
            --exclude='node_modules' \
            --exclude='dogfood' \
            --exclude='test' \
            --exclude='memory' \
            --exclude='worker' \
            --exclude='bin' \
            --exclude='*.log' \
            --exclude='.env*' \
            ./ _site/
          echo "::group::Staged files"
          find _site -maxdepth 2 -type f | sort
          echo "::endgroup::"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
