name: Security scan

# Scans for committed secrets. Runs on push, PR, and weekly.
# GitHub's built-in secret-scanning is on too (noted in the repo info API),
# but gitleaks catches custom patterns and historical commits.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '7 7 * * 1'  # Mondays 07:07 UTC
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so historical commits are scanned

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3
