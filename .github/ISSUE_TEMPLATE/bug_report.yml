name: Bug report
description: Something is broken in the chat UI or a provider.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What's broken, in one paragraph.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Numbered steps, starting from a fresh page load.
      placeholder: |
        1. Open index.html
        2. Pick provider X, model Y
        3. Send "hello"
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs actual
      description: What you expected to happen, and what actually happened. Paste any console errors.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Browser + provider
      description: e.g. "Chrome 131 on Windows 11, provider=airforce, model=grok-4.1-mini:free"
    validations:
      required: true
  - type: textarea
    id: workarounds
    attributes:
      label: Workarounds tried
      description: Different provider? Hard refresh? Incognito? Anything that narrowed it down.
    validations:
      required: false
